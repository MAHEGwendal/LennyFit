<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    
    <!-- Favicon & Identité -->
    <link rel="icon" href="/logos/Logo_ico_NO.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Indexation & Robotique -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">

    <!-- SEO Titre & Description (Crucial pour Google) -->
    <!-- Maximum 60 caractères pour le titre pour éviter qu'il soit tronqué -->
    <title>LennyFit | Coach Sportif Personnel à Nantes & En Ligne</title>
    
    <!-- Maximum 150-160 caractères pour la description -->
    <meta name="description" content="Atteignez vos objectifs avec LennyFit, coach sportif à Nantes. Coaching individuel personnalisé en présentiel ou programme 100% en ligne pour des résultats durables.">
    <meta name="keywords" content="coach sportif nantes, coaching individuel, musculation nantes, perte de poids nantes, remise en forme, programme de sport en ligne, LennyFit">

    <!-- Balises Open Graph / Facebook (Pour un superbe affichage lors des partages sur les réseaux ou SMS) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.lennyfit.fr/"> <!-- Remplacez par votre vrai domaine -->
    <meta property="og:title" content="LennyFit | Coach Sportif Personnel à Nantes & En Ligne">
    <meta property="og:description" content="Coaching sportif individuel et personnalisé en présentiel à Nantes ou 100% en ligne. Dépassez vos limites, atteignez vos objectifs !">

    <!-- Cartes Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LennyFit | Coach Sportif Personnel à Nantes & En Ligne">
    <meta name="twitter:description" content="Coaching sportif individuel et personnalisé à Nantes ou 100% en ligne.">
    <meta name="twitter:image" content="https://www.lennyfit.fr/og-image.jpg">

    <!-- Lien canonique (Évite le duplicate content si votre site est accessible via http, https, www, etc.) -->
    <link rel="canonical" href="https://www.lennyfit.fr/">

  </head>
  <body class="bg-moon text-ink antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
